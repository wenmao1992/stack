p:10px}.ibar{width:3px;height:26px;border-radius:2px;flex-shrink:0}.iname{font-size:14px;font-weight:400}.itiming{font-size:11px;color:var(--hint);margin-top:1px;font-family:var(--mono)}.ir{display:flex;align-items:center;gap:9px}.iserving{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}.chev{color:var(--hint);font-size:15px;line-height:1}.sfooter{margin-top:.75rem;font-family:var(--mono);font-size:11px;color:var(--hint);text-align:right}

div>    <div class="chips" id="extra-row">      <button class="chip" data-g="extra" data-v="prostate">Prostate Support</button>      <button class="chip" data-g="extra" data-v="testosterone">Testosterone Support</button>    </div>  </div>  <!-- Yesterday Feeling Score -->

const SB_URL  = 'https://ufzgcxawnuywogktmamv.supabase.co';   // ← replace
const SB_ANON = 'sb_publishable_-uCqvpa5ctmuuboGZ3CWiQ_DfPtbO0W';                       // ← replace (anon/public key, safe to expose)
const SB_HEADS = {
  'Content-Type': 'application/json',
  'apikey': SB_ANON,
  'Authorization': 'Bearer ' + SB_ANON
};

let _memLog  = {};     // local in-memory cache
let _sbReady = false;

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--hint)';
}

async function sbGet(key) {
  const r = await fetch(
    `${SB_URL}/rest/v1/stack_log?key=eq.${encodeURIComponent(key)}&select=value`,
    { headers: SB_HEADS }
  );
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const rows = await r.json();
  return rows.length ? rows[0].value : null;
}

async function sbUpsert(key, value) {
  const r = await fetch(`${SB_URL}/rest/v1/stack_log`, {
    method: 'POST',
    headers: { ...SB_HEADS, 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
}

async function loadLog() {
  if (_sbReady) return _memLog;
  setSyncStatus('Loading cloud data…', 'var(--hint)');
  try {
    const meta = await sbGet('meta');
    _memLog = meta ? { ...meta } : {};
    if (!_memLog.days) _memLog.days = {};
    _sbReady = true;
    setSyncStatus('☁️ Synced', 'var(--accent)');
  } catch(e) {
    setSyncStatus('⚠️ Offline — cloud unavailable', 'var(--warn)');
  }
  return _memLog;
}

async function saveLog(log) {
  _memLog = log;
  _sbReady = true;
  try {
    // meta row: everything except days{}
    const { days, ...meta } = log;
    await sbUpsert('meta', meta);
    // today's daily snapshot as its own row
    const today = todayStr();
    if (days && days[today]) {
      await sbUpsert(today, days[today]);
    }
    setSyncStatus('☁️ Saved', 'var(--accent)');
    _saveError = null;
  } catch(e) {
    _saveError = 'Supabase save failed: ' + e.message;
    setSyncStatus('⚠️ ' + _saveError, 'var(--danger)');
  }
}function pad(n){ return String(n).padStart(2,'0'); }function dateToStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }function todayStr(){ return dateToStr(new Date()); }function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return dateToStr(d); }function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000); }// Prostate Support = alt-day (every other day). Decide if today is an ON day.// ON  -> in today's stack;  OFF -> skipped, returns tomorrow.
async function prostateStatus(){  const last = (await loadLog()).lastProstateDate;  if(!last) return { on:true, last:null };          // never recorded -> take it  
const diff = daysBetween(last, todayStr());  if(diff <= 0) return { on:true,  last };           // already taken today -> shown  
if(diff === 1) return { on:false, last };          // taken yesterday -> off day  
return { on:true, last };                          // 2+ days ago -> on day

function getStack(add, mode, acts, feels, extras) {  extras = extras || new Set();  const groups = [];  // ── GROUP 1: Daily base — always (long-term) ─────────────────────────

async function render() {  const explorer = document.getElementById('explorer-cb').checked;  const ps = await prostateStatus();  const prostateSel = S.extras.has('prostate');  const testoSel = S.extras.has('testosterone');  const groups = getStack(S.add, S.mode, S.acts, S.feels, S.extras);  const usedKeys = new Set(groups.flatMap(g => g.items.map(i => i.key)));  const orphans  = findOrphans(usedKeys);  const out = document.getElementById('output');  const addLabel = S.add==='yes' ? `Adderall ${S.dose} mg` : 'No Adderall';  const actLabel = [...S.acts].map(cap).join(' + ');  const feelLabel= [...S.feels].map(cap).join(' + ');  const dayDesc  = [cap(S.mode), actLabel, feelLabel].filter(Boolean).join(' · ');  let html = '<hr>';  html += `<div class="day-badge ${S.add==='yes'?'hadd':'noadd'}"><div class="dot"></div>${addLabel} · ${dayDesc}${explorer?' · <span style="color:var(--warn)">explorer</span>':''}</div>`;  // ── Alternate-day (Prostate Support) banner ──

{    const zn = 18.5 + (prostateSel?15:0) + (testoSel?15:0);    const parts = ['GNC 18.5'];    if (testoSel) parts.push('TestoSupport 15');    if (prostateSel) parts.push('Prostate 15');    const over = zn > 40;    html += `<div class="orphan-banner" style="border-color:${over?'rgba(246,168,91,.25)':'var(--border)'};${over?'':'background:var(--surface2);color:var(--muted);'}">      <strong>Zinc today ≈ ${zn} mg.</strong> ${parts.join(' + ')}${over?' — briefly over the 40 mg UL; keep Prostate/Testo as-needed (not daily) so the weekly average stays in range.':' — within range.'} Standalone Zinc cap is never taken.    </div>`;  }  // ── Non-intentional orphans (exclude variant pairs + as-needed keys) ──  
const ignore = ['Citicoline_1x','Citicoline_2x','DLPA_1x','DLPA_2x','Maca_2x','Maca_3x','Black_Ginger_1x','Black_Ginger_2x','Energy_Support_1x','Energy_Support_2x','Vitamin_D3','Stasis', ...AS_NEEDED_KEYS];  const unexpectedOrphans = orphans.filter(k => !ignore.includes(k));  const variantPairs = [    ['Citicoline_1x','Citicoline_2x'],    ['DLPA_1x','DLPA_2x'],    ['Maca_2x','Maca_3x'],    ['Black_Ginger_1x','Black_Ginger_2x'],    ['Energy_Support_1x','Energy_Support_2x'],    ['Vitamin_D3','Stasis'],  ];  const flagged = new Set();  unexpectedOrphans.forEach(k => {    const pair = variantPairs.find(p => p.includes(k));    if (pair) {      if (!usedKeys.has(pair[0]) && !usedKeys.has(pair[1])) flagged.add(pair.join(' / '));    } else {      flagged.add(k);    }  });  if (flagged.size > 0) {    const names = [...flagged].map(k => {      if (k.includes(' / ')) return k.split(' / ').map(x => DB[x]?.name || x).join(' or ');      return DB[k]?.name || k;    });    html += `<div class="orphan-banner" style="border-color:rgba(246,91,91,.25);background:var(--danger-dim);color:var(--danger)">      <strong>Heads up — these supplements aren't in today's stack:</strong><br>${names.join(', ')}.<br>      Want to add any of these? Select a relevant mode or modifier above.    </div>`;  }  html += '<div class="stack-list">';  let total = 0;  groups.forEach(g => {    html += `<div class="ghead">${g.label}</div>`;    g.items.forEach(item => {      const d = DB[item.key];      if (!d) return;      total++;      html += `<div class="sitem" onclick="openModal('${item.key}')">        <div class="il">          <div class="ibar" style="background:${d.color}"></div>          <div>            <div class="iname">${d.name}</div>            <div class="itiming">${d.timing}</div>          </div>        </div>        <div class="ir">          <span class="iserving">${item.serving}</span>          <span class="chev">›</span>        </div>      </div>`;    });  });  html += '</div>';  html += `<div class="sfooter">${total} items · tap any for details</div>`;
  if (_saveError) html += `<div class="sfooter" style="color:var(--danger);margin-top:4px">⚠️ ${_saveError}</div>`;  out.innerHTML = html;  out.scrollIntoView({ behavior:'smooth', block:'nearest' });}function cap(s) {  const map = { sharp:'Sharp', focus:'Focus', relax:'Relax', workout:'Workout', performance:'Performance', social:'Social',    fatigue:'Brain fatigue', physical_tired:'Physical tired', down:'Low mood', anxiety:'Anxiety', poor_sleep:'Poor sleep' };  return map[s] || (s.charAt(0).toUpperCase() + s.slice(1));}function openModal(key) {  const d = DB[key]; if (!d) return;  const rows = Object.entries(d.details).map(([k,v]) =>    `<tr><td>${k}</td><td>${v}</td></tr>`).join('');  document.getElementById('modal').innerHTML = `    <div class="mov" id="mov" onclick="if(event.target===this)closeModal()">      <div class="mbox">        <div class="mhandle"></div>        <div class="mname">${d.name}</div>        <div class="mtiming">${d.timing}</div>        <table class="mtable"><tbody>${rows}</tbody></table>        <button class="closebtn" onclick="closeModal()">Dismiss</button>      </div>    </div>`;}function closeModal() { document.getElementById('modal').innerHTML=''; }// ── Event wiring ─────────────────────────────────────────────────────────────
 
// Helper: single-select within a container
function bindSingle(containerId, stateKey, onSelect) {
  var container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('.chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      container.querySelectorAll('.chip').forEach(function(x) { x.classList.remove('on'); });
      btn.classList.add('on');
      S[stateKey] = btn.dataset.v;
      if (onSelect) onSelect(btn.dataset.v);
    });
  });
}
 
// Helper: multi-select within a container
function bindMulti(containerId, stateSet) {
  var container = document.getElementById(containerId);
  if (!container) return;
  container.querySelectorAll('.chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var v = btn.dataset.v;
      if (stateSet.has(v)) {
        stateSet.delete(v);
        btn.classList.remove('on');
      } else {
        stateSet.add(v);
        btn.classList.add('on');
      }
    });
  });
}
 
bindSingle('add-row', 'add', function(v) {

  ds.style.opacity = v === 'yes' ? '1' : '0.28';
  ds.style.pointerEvents = v === 'yes' ? '' : 'none';
